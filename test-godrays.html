<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>God Ray Edge Fix - Test Page</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; color: #ccc; font-family: monospace; overflow: hidden; }
    canvas { display: block; }
    #controls {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.85); padding: 10px 16px;
      display: flex; flex-wrap: wrap; gap: 8px 20px; align-items: center;
      font-size: 12px; z-index: 10;
    }
    #controls label { display: flex; align-items: center; gap: 6px; }
    #controls input[type=range] { width: 100px; }
    #controls select { background: #222; color: #ccc; border: 1px solid #555; padding: 2px 4px; }
    #title {
      position: fixed; top: 10px; left: 16px;
      font-size: 13px; color: #8ab4f8; letter-spacing: 1.5px; z-index: 10;
    }
    .val { min-width: 36px; text-align: right; }
  </style>
</head>
<body>
<div id="title">GOD RAY EDGE FIX - ISOLATED TEST</div>
<div id="controls">
  <label>MODE
    <select id="mode">
      <option value="original">Original (harsh edges)</option>
      <option value="fixed" selected>Fixed (smooth min)</option>
      <option value="split">Split comparison</option>
    </select>
  </label>
  <label>INTENSITY <input type="range" id="intensity" min="0" max="2" step="0.05" value="1.05"><span class="val" id="intensityVal">1.05</span></label>
  <label>BEAM SCALE <input type="range" id="beamScale" min="0.03" max="0.4" step="0.01" value="0.04"><span class="val" id="beamScaleVal">0.04</span></label>
  <label>TILT <input type="range" id="tilt" min="0" max="0.5" step="0.01" value="0.42"><span class="val" id="tiltVal">0.42</span></label>
  <label>FLOOR REACH <input type="range" id="floorReach" min="0" max="1" step="0.01" value="0.07"><span class="val" id="floorReachVal">0.07</span></label>
  <label>DENSITY <input type="range" id="density" min="0.1" max="1.5" step="0.05" value="0.3"><span class="val" id="densityVal">0.3</span></label>
  <label>SMOOTH K <input type="range" id="smoothK" min="0.1" max="2.0" step="0.05" value="2.0"><span class="val" id="smoothKVal">2.0</span></label>
</div>

<script async src="https://ga.jspm.io/npm:es-module-shims@1.10.0/dist/es-module-shims.js"></script>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
  }
}
</script>
<script type="module">
import * as THREE from 'three';

// ── Shared GLSL pieces ──
const COMMON_HEADER = /* glsl */ `
  uniform float uTime;
  uniform float uSurfaceY;
  uniform float uIntensity;
  uniform float uDensity;
  uniform float uMaxDist;
  uniform float uBeamScale;
  uniform float uCausticSpeed;
  uniform float uFloorReach;
  uniform float uTilt;
  uniform float uSmoothK;
  uniform mat4 uInvProjection;
  uniform mat4 uInvView;
  uniform vec3 uCameraPos;
  uniform sampler2D tDepth;
  uniform int uMode; // 0 = original, 1 = fixed, 2 = split
  varying vec2 vUv;

  vec2 grHash(vec2 p) {
    return vec2(
      fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453),
      fract(sin(dot(p, vec2(269.5, 183.3))) * 43758.5453)
    );
  }

  float grValueNoise(vec2 p) {
    vec2 i = floor(p);
    vec2 f = fract(p);
    f = f * f * (3.0 - 2.0 * f);
    float a = fract(sin(dot(i, vec2(127.1, 311.7))) * 43758.5453);
    float b = fract(sin(dot(i + vec2(1.0, 0.0), vec2(127.1, 311.7))) * 43758.5453);
    float c = fract(sin(dot(i + vec2(0.0, 1.0), vec2(127.1, 311.7))) * 43758.5453);
    float d = fract(sin(dot(i + vec2(1.0, 1.0), vec2(127.1, 311.7))) * 43758.5453);
    return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
  }

  float interleavedGradientNoise(vec2 pixel) {
    return fract(52.9829189 * fract(0.06711056 * pixel.x + 0.00583715 * pixel.y));
  }

  vec2 domainWarp(vec2 uv, float time) {
    float warpSpeed = time * 0.08;
    vec2 warp1 = vec2(
      grValueNoise(uv * 0.35 + warpSpeed),
      grValueNoise(uv * 0.35 + vec2(7.3, 2.8) + warpSpeed * 0.9)
    );
    vec2 warp2 = vec2(
      grValueNoise(uv * 0.7 + vec2(3.1, 5.9) + warpSpeed * 1.3),
      grValueNoise(uv * 0.7 + vec2(11.4, 8.2) + warpSpeed * 0.7)
    );
    return uv + (warp1 - 0.5) * 1.1 + (warp2 - 0.5) * 0.4;
  }
`;

// ── Original beamInfo (harsh F1) ──
const ORIGINAL_BEAM = /* glsl */ `
  vec3 beamInfoOriginal(vec2 uv, float time) {
    uv = domainWarp(uv, time);
    vec2 id = floor(uv);
    vec2 p = fract(uv) - 0.5;
    float minDist = 1.0;
    vec2 nearestCell = vec2(0.0);
    for (int y = -1; y <= 1; y++) {
      for (int x = -1; x <= 1; x++) {
        vec2 neighbor = vec2(float(x), float(y));
        vec2 cellId = id + neighbor;
        vec2 offset = grHash(cellId);
        offset = 0.5 + 0.45 * sin(6.2831 * offset);
        vec2 diff = neighbor + offset - p;
        float d = length(diff);
        if (d < minDist) {
          minDist = d;
          nearestCell = cellId;
        }
      }
    }
    float beam = 1.0 - smoothstep(0.0, 0.9, minDist);
    beam *= beam;
    float rawReach = fract(sin(dot(nearestCell, vec2(53.7, 91.3))) * 43758.5453);
    float depthReach = rawReach * rawReach * rawReach;
    return vec3(beam, depthReach, 0.0);
  }
`;

// ── Fixed beamInfo (log-sum-exp smooth Voronoi) ──
const FIXED_BEAM = /* glsl */ `
  vec3 beamInfoFixed(vec2 uv, float time) {
    uv = domainWarp(uv, time);
    vec2 id = floor(uv);
    vec2 p = fract(uv) - 0.5;

    float smoothK = uSmoothK;
    float expSum = 0.0;
    float nearMinDist = 1.0;
    vec2 nearestCell = vec2(0.0);

    for (int y = -1; y <= 1; y++) {
      for (int x = -1; x <= 1; x++) {
        vec2 neighbor = vec2(float(x), float(y));
        vec2 cellId = id + neighbor;
        vec2 offset = grHash(cellId);
        offset = 0.5 + 0.45 * sin(6.2831 * offset);
        vec2 diff = neighbor + offset - p;
        float d = length(diff);
        expSum += exp(-smoothK * d);
        if (d < nearMinDist) {
          nearMinDist = d;
          nearestCell = cellId;
        }
      }
    }

    // Log-sum-exp smooth minimum: C-infinity smooth everywhere
    float smoothDist = -log(expSum) / smoothK;

    float beam = 1.0 - smoothstep(0.0, 0.9, smoothDist);
    beam *= beam;

    float rawReach = fract(sin(dot(nearestCell, vec2(53.7, 91.3))) * 43758.5453);
    float depthReach = rawReach * rawReach * rawReach;
    return vec3(beam, depthReach, 0.0);
  }
`;

const BEAM_BREAKUP = /* glsl */ `
  float beamBreakup(vec2 xz, float time) {
    float n1 = grValueNoise(xz * 0.7 + time * 0.06);
    float n2 = grValueNoise(xz * 1.4 + vec2(4.7, 1.3) + time * 0.04);
    float n = n1 * 0.65 + n2 * 0.35;
    return smoothstep(0.2, 0.55, n);
  }
`;

const MAIN_FUNC = /* glsl */ `
  vec3 worldPosFromDepth(vec2 uv, float depth) {
    vec4 ndc = vec4(uv * 2.0 - 1.0, depth * 2.0 - 1.0, 1.0);
    vec4 viewPos = uInvProjection * ndc;
    viewPos /= viewPos.w;
    vec4 worldPos = uInvView * viewPos;
    return worldPos.xyz;
  }

  void main() {
    float rawDepth = texture2D(tDepth, vUv).r;
    vec3 hitPos = worldPosFromDepth(vUv, rawDepth);
    float hitDist = length(hitPos - uCameraPos);
    vec3 rayDir = normalize(hitPos - uCameraPos);
    float marchDist = min(hitDist, uMaxDist);

    float viewAngleFade = 1.0 - smoothstep(0.65, 0.97, abs(rayDir.y));
    float fadeHalfLife = mix(2.0, 16.0, uFloorReach);

    const int NUM_STEPS = 16;
    float stepSize = marchDist / float(NUM_STEPS);
    float accum = 0.0;

    vec2 pixelCoord = gl_FragCoord.xy;
    float jitter = interleavedGradientNoise(pixelCoord) * stepSize;

    // Determine which algorithm to use for this pixel
    bool useFixed;
    if (uMode == 2) {
      // Split mode: left = original, right = fixed
      useFixed = vUv.x > 0.5;
    } else {
      useFixed = uMode == 1;
    }

    for (int i = 0; i < NUM_STEPS; i++) {
      float t = (float(i) + 0.5) * stepSize + jitter;
      vec3 samplePos = uCameraPos + rayDir * t;
      if (samplePos.y > uSurfaceY) continue;

      float depth = uSurfaceY - samplePos.y;
      float wobble = sin(uTime * 0.03) * 0.02;
      vec2 tiltDir = vec2(uTilt + wobble, (uTilt * 0.48) + wobble * 0.7);
      vec2 sampleUV = (samplePos.xz + depth * tiltDir) * uBeamScale;

      vec3 info;
      if (useFixed) {
        info = beamInfoFixed(sampleUV, uTime * uCausticSpeed);
      } else {
        info = beamInfoOriginal(sampleUV, uTime * uCausticSpeed);
      }
      float pattern = info.x;
      float depthReach = info.y;

      float centerDist = length(samplePos.xz - uCameraPos.xz);
      float centerBeam = exp(-centerDist * centerDist * 0.04);
      pattern = max(pattern, centerBeam * 0.8);
      depthReach = max(depthReach, centerBeam * 0.6);

      float beamFadeHL = mix(1.5, fadeHalfLife, depthReach);
      float heightFade = exp(-depth / beamFadeHL);

      vec2 tiltedXZ = samplePos.xz + depth * tiltDir;
      float breakup = beamBreakup(tiltedXZ, uTime * uCausticSpeed);
      pattern *= mix(0.45, 1.0, breakup);

      accum += pattern * heightFade * uDensity * stepSize;
    }

    accum = 1.0 - exp(-accum * 1.8);
    vec3 rayColor = vec3(0.55, 0.78, 1.0) * accum * uIntensity * viewAngleFade;

    // Split line indicator
    if (uMode == 2 && abs(vUv.x - 0.5) < 0.001) {
      rayColor = vec3(1.0, 0.5, 0.0);
    }

    gl_FragColor = vec4(rayColor, 1.0);
  }
`;

const fragmentShader = COMMON_HEADER + ORIGINAL_BEAM + FIXED_BEAM + BEAM_BREAKUP + MAIN_FUNC;

const vertexShader = /* glsl */ `
  varying vec2 vUv;
  void main() {
    vUv = uv;
    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
  }
`;

// ── Scene setup ──
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.5, 100);
camera.position.set(0, -4, 0);
camera.lookAt(0, -4, -10);

// Simple underwater scene: floor + a couple of objects for depth
const floorGeo = new THREE.PlaneGeometry(60, 60);
const floorMat = new THREE.MeshBasicMaterial({ color: 0x1a3040 });
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -8;
scene.add(floor);

// Some rocks for depth variation
for (let i = 0; i < 6; i++) {
  const s = 0.5 + Math.random() * 1.5;
  const rock = new THREE.Mesh(
    new THREE.SphereGeometry(s, 8, 6),
    new THREE.MeshBasicMaterial({ color: 0x2a4050 })
  );
  rock.position.set(
    (Math.random() - 0.5) * 20,
    -8 + s * 0.5,
    -5 - Math.random() * 15
  );
  rock.scale.y = 0.5 + Math.random() * 0.5;
  scene.add(rock);
}

// Depth target
const size = renderer.getSize(new THREE.Vector2());
const pr = renderer.getPixelRatio();
const depthTarget = new THREE.WebGLRenderTarget(
  Math.floor(size.x * pr), Math.floor(size.y * pr),
  { minFilter: THREE.NearestFilter, magFilter: THREE.NearestFilter }
);
depthTarget.depthTexture = new THREE.DepthTexture(
  Math.floor(size.x * pr), Math.floor(size.y * pr)
);
depthTarget.depthTexture.type = THREE.UnsignedIntType;

// God ray overlay
const uniforms = {
  tDepth: { value: null },
  uTime: { value: 0 },
  uSurfaceY: { value: 2.0 },
  uIntensity: { value: 1.05 },
  uDensity: { value: 0.3 },
  uMaxDist: { value: 18.0 },
  uBeamScale: { value: 0.04 },
  uCausticSpeed: { value: 0.4 },
  uFloorReach: { value: 0.07 },
  uTilt: { value: 0.42 },
  uSmoothK: { value: 2.0 },
  uInvProjection: { value: new THREE.Matrix4() },
  uInvView: { value: new THREE.Matrix4() },
  uCameraPos: { value: new THREE.Vector3() },
  uMode: { value: 1 },
};

const godrayMat = new THREE.ShaderMaterial({
  uniforms,
  vertexShader,
  fragmentShader,
  depthWrite: false,
  depthTest: false,
  transparent: true,
  blending: THREE.AdditiveBlending,
});

const quadScene = new THREE.Scene();
quadScene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), godrayMat));
const quadCam = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

// ── Water background (simple gradient) ──
scene.background = new THREE.Color(0x0a2535);

// ── Camera orbit ──
let angle = 0;
const orbitRadius = 0.1;

// ── Controls ──
const controls = {
  mode: document.getElementById('mode'),
  intensity: document.getElementById('intensity'),
  beamScale: document.getElementById('beamScale'),
  tilt: document.getElementById('tilt'),
  floorReach: document.getElementById('floorReach'),
  density: document.getElementById('density'),
  smoothK: document.getElementById('smoothK'),
};

function syncControls() {
  uniforms.uIntensity.value = parseFloat(controls.intensity.value);
  uniforms.uBeamScale.value = parseFloat(controls.beamScale.value);
  uniforms.uTilt.value = parseFloat(controls.tilt.value);
  uniforms.uFloorReach.value = parseFloat(controls.floorReach.value);
  uniforms.uDensity.value = parseFloat(controls.density.value);
  uniforms.uSmoothK.value = parseFloat(controls.smoothK.value);

  const modeMap = { original: 0, fixed: 1, split: 2 };
  uniforms.uMode.value = modeMap[controls.mode.value] ?? 1;

  // Update value displays
  for (const [key, el] of Object.entries(controls)) {
    const valEl = document.getElementById(key + 'Val');
    if (valEl) valEl.textContent = el.value;
  }
}

for (const el of Object.values(controls)) {
  el.addEventListener('input', syncControls);
}
syncControls();

// ── Render loop ──
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const elapsed = clock.getElapsedTime();

  // Gentle camera drift
  angle += 0.002;
  camera.position.x = Math.sin(angle) * orbitRadius;
  camera.position.z = Math.cos(angle) * orbitRadius - 5;
  camera.lookAt(0, -4, -10);

  uniforms.uTime.value = elapsed;
  uniforms.uCameraPos.value.copy(camera.position);
  uniforms.uInvProjection.value.copy(camera.projectionMatrixInverse);
  uniforms.uInvView.value.copy(camera.matrixWorld);

  // Depth pass
  renderer.setRenderTarget(depthTarget);
  renderer.clear();
  renderer.render(scene, camera);
  renderer.setRenderTarget(null);
  uniforms.tDepth.value = depthTarget.depthTexture;

  // Scene pass
  renderer.render(scene, camera);

  // God ray overlay
  const origAutoClear = renderer.autoClear;
  renderer.autoClear = false;
  renderer.render(quadScene, quadCam);
  renderer.autoClear = origAutoClear;
}

animate();

window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
  const pr = renderer.getPixelRatio();
  depthTarget.setSize(Math.floor(w * pr), Math.floor(h * pr));
});
</script>
</body>
</html>
